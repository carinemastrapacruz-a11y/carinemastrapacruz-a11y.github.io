<!-- ════════════════════════════════════════════════
     ASISTENTE DE PEDIDO — reemplaza el #wizardModal
     y el #summaryModal en tu index.html
     ════════════════════════════════════════════════ -->

<!-- Order Assistant Modal -->
<div id="wizardModal" class="modal wiz-modal">
    <div class="modal-content wiz-modal-content">

        <!-- Header -->
        <div class="modal-header wiz-header">
            <h2><i class="fas fa-concierge-bell"></i> Asistente de Pedido</h2>
            <button class="modal-close" onclick="closeWizard()">&times;</button>
        </div>

        <!-- Tab Bar (categorías deslizables) -->
        <div class="wiz-tab-bar-wrap">
            <div class="wiz-tab-bar" id="wizTabBar">
                <!-- generado por JS -->
            </div>
        </div>

        <!-- Product Panels -->
        <div class="wiz-panels-wrap" id="wizPanels">
            <!-- generado por JS -->
        </div>

        <!-- Mini Cart Footer -->
        <div class="wiz-cart-footer" id="wizCartFooter">
            <div class="wiz-cart-header-row">
                <span class="wiz-cart-label"><i class="fas fa-shopping-basket"></i> Tu selección</span>
                <span class="wiz-cart-total" id="wizCartTotal"></span>
            </div>
            <div class="wiz-cart-preview" id="wizCartPreview">
                <span class="wiz-empty-msg">Aún no has añadido nada</span>
            </div>
            <button class="wiz-confirm-btn" onclick="wizardConfirm()">
                Continuar con el pedido <i class="fas fa-arrow-right"></i>
            </button>
        </div>

    </div>
</div>

<!-- Final Summary Modal -->
<div id="summaryModal" class="modal">
    <div class="modal-content summary-view">
        <div class="modal-header">
            <h2><i class="fas fa-receipt"></i> Resumen del Pedido</h2>
            <button class="modal-close" onclick="closeSummary()">&times;</button>
        </div>
        <div id="summaryContent" class="summary-body"></div>
        <div class="summary-actions">
            <button class="btn-share" onclick="shareOrder()">
                <i class="fas fa-share-alt"></i> Compartir / Copiar
            </button>
            <p class="summary-tip">Muestre este resumen al camarero para confirmar su orden.</p>
        </div>
    </div>
</div>
